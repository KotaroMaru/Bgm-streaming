<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>BGM コントロール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="parent-body">

  <div class="parent-container">

    <!-- Header -->
    <header class="p-header">
      <h1 class="p-header__title">BGM コントロール</h1>
      <div class="child-badge" id="childStatus">
        <span class="child-badge__dot"></span>
        <span class="child-badge__text">未接続</span>
      </div>
    </header>

    <!-- Now Playing -->
    <section class="now-playing card">
      <div class="now-playing__title" id="nowPlayingTitle">—</div>
      <div class="now-playing__time">
        <span id="currentTime">0:00</span>
        <div class="seek-bar-wrap">
          <div class="seek-bar-bg">
            <div class="seek-bar-fill" id="seekFill"></div>
          </div>
          <input type="range" class="seek-bar-range" id="seekRange" min="0" max="100" value="0" step="0.1">
        </div>
        <span id="durationTime">0:00</span>
      </div>
    </section>

    <!-- Controls -->
    <section class="controls card">
      <div class="controls__row controls__row--main">
        <button class="ctrl-btn" id="btnPrev" aria-label="前の曲">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-btn--play" id="btnPlay" aria-label="再生">
          <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" id="btnNext" aria-label="次の曲">
          <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm2-8.14 5.32 2.14L8 14.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
      </div>

      <div class="controls__row controls__row--sub">
        <button class="ctrl-btn ctrl-btn--sm toggle-btn" id="btnShuffle" aria-label="シャッフル">
          <svg viewBox="0 0 24 24"><path d="M10.59 9.17 5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
        </button>
        <button class="ctrl-btn ctrl-btn--sm toggle-btn loop-btn" id="btnLoop" aria-label="ループ" data-loop="none">
          <svg class="icon-loop-all" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/></svg>
          <svg class="icon-loop-one" viewBox="0 0 24 24" style="display:none"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/></svg>
        </button>
      </div>

      <div class="volume-row">
        <svg class="volume-icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100">
        <span class="volume-label" id="volumeLabel">100%</span>
      </div>
    </section>

    <!-- Upload -->
    <section class="upload-section card">
      <h2 class="section-title">アップロード <small class="note">（最大 50 MB）</small></h2>
      <div class="upload-area" id="uploadArea">
        <input type="file" id="fileInput" accept="audio/*" multiple>
        <label for="fileInput" class="upload-label">
          <svg viewBox="0 0 24 24" class="upload-icon"><path d="M19.35 10.04A7.49 7.49 0 0 0 12 4C9.11 4 6.6 5.64 5.35 8.04A5.994 5.994 0 0 0 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
          <span>ファイルを選択 または ドロップ</span>
          <span class="upload-hint">MP3 · AAC · FLAC · WAV</span>
        </label>
      </div>
      <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-bg">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="progress-label" id="progressLabel">0%</span>
      </div>
    </section>

    <!-- Playlist -->
    <section class="playlist-section card">
      <h2 class="section-title">プレイリスト <span class="track-count" id="trackCount">0</span>曲</h2>
      <ul class="playlist" id="playlist">
        <li class="playlist-empty" id="playlistEmpty">曲がありません</li>
      </ul>
    </section>

  </div><!-- /.parent-container -->

  <script src="/socket.io/socket.io.js"></script>
  <script src="parent.js"></script>
</body>
</html>
